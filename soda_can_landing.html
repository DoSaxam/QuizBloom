<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Drink Landing Page</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome for icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    integrity="sha512-0R7GxEQ+duaS3x34J/3xSIz2lbrTPN8n3ywNJ5YJ+Wy0nJ1wnhQBp/f6DGN8UvKjPHTeq7zZ0HMyE5L6ClXNpw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <style>
    :root {
      --primary: #ffb703;
      --text-dark: #000000;
      --text-light: #666666;
      --btn-bg: #000000;
      --btn-text: #ffffff;
      --bg: #ffffff;
      --accent: #e2e8f0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: var(--bg);
      overflow-x: hidden;
    }

    /* Global gradient glow */
    body::before {
      content: "";
      position: fixed;
      top: -200px;
      left: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(
        circle at center,
        rgba(122, 255, 122, 0.5),
        rgba(122, 255, 122, 0) 70%
      );
      filter: blur(50px);
      pointer-events: none;
      z-index: -1;
    }

    /* Card shadow around main container */
    .card-shadow {
      max-width: 1080px;
      margin: 40px auto;
      background: #fff;
      border-radius: 20px;
      padding: 60px 80px;
      position: relative;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05),
        0 40px 60px rgba(0, 0, 0, 0.04);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 50px;
    }

    .nav-list {
      list-style: none;
      display: flex;
      gap: 40px;
    }
    .nav-list li {
      font-size: 0.9rem;
      color: var(--text-light);
      cursor: pointer;
      transition: color 0.3s;
    }
    .nav-list li.active,
    .nav-list li:hover {
      color: var(--text-dark);
      font-weight: 600;
    }

    .icon-group {
      display: flex;
      align-items: center;
      gap: 25px;
      font-size: 1.1rem;
      color: var(--text-dark);
      cursor: pointer;
    }

    main {
      display: flex;
      gap: 60px;
      justify-content: space-between;
    }

    /* Left column */
    .content {
      flex: 0 0 40%;
    }
    .content h1 {
      font-size: 3rem;
      line-height: 1.1;
      margin-bottom: 15px;
    }
    .content h1 span {
      display: block;
    }
    .subtitle {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 8px;
    }
    .subtitle span {
      color: var(--primary);
    }
    .price {
      margin: 25px 0 35px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .quantity-select {
      background: var(--accent);
      border-radius: 10px;
      padding: 15px 20px;
      display: inline-flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 35px;
    }
    .quantity-select label {
      font-size: 0.85rem;
      color: var(--text-light);
    }
    .stepper {
      display: flex;
      align-items: center;
    }
    .stepper button {
      width: 30px;
      height: 30px;
      border: none;
      background: #ffffff;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .stepper button:hover {
      background: var(--primary);
      color: #fff;
    }
    .stepper span {
      width: 40px;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 50px;
      padding: 14px 30px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
    }

    /* Right visual area */
    .visual {
      position: relative;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle-bg {
      position: absolute;
      width: 390px;
      height: 390px;
      background: #e7f2ff;
      border-radius: 50%;
      z-index: 0;
    }

    .can {
      width: 220px;
      position: relative;
      z-index: 1;
      transition: transform 0.3s;
    }
    .can.left {
      transform: rotate(-20deg) translateX(-50px);
    }
    .can.right {
      transform: rotate(10deg) translateX(50px);
    }
    .can:hover {
      transform: scale(1.05) rotate(calc(var(--rot) * 1deg)) translateX(calc(var(--shift)));
    }

    /* Badges */
    .badge {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      padding: 10px 18px;
      border-radius: 40px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      font-size: 0.75rem;
    }
    .badge img {
      width: 26px;
      height: 26px;
    }

    .badge.best {
      top: 110px;
      right: -30px;
    }
    .badge.classic {
      bottom: 60px;
      left: -70px;
    }
    .badge.original {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      padding: 0;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      line-height: 1.2;
      background: var(--primary);
      color: #fff;
      right: 70px;
      bottom: 100px;
    }

    /* Side thumbnail list */
    .thumb-list {
      position: absolute;
      right: -130px;
      top: 0;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }
    .thumb {
      width: 90px;
      height: 90px;
      background: #ffffff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .thumb img {
      width: 60%;
    }
    .thumb:hover {
      transform: translateX(-6px);
    }

    /* Giveaway footer link */
    .giveaway {
      font-size: 0.8rem;
      color: var(--text-light);
      position: absolute;
      bottom: -40px;
      right: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .giveaway i {
      transform: rotate(-45deg);
    }

    @media (max-width: 1000px) {
      main {
        flex-direction: column;
        align-items: center;
      }
      .content {
        text-align: center;
      }
      .visual {
        margin-top: 40px;
      }
      .thumb-list {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="card-shadow">
    <header>
      <ul class="nav-list">
        <li>HOME</li>
        <li class="active">PRODUCT</li>
        <li>ABOUT</li>
        <li>SUPPORT</li>
      </ul>
      <div class="icon-group">
        <i class="fas fa-search"></i>
        <i class="fas fa-shopping-cart"></i>
      </div>
    </header>

    <main>
      <!-- Left column -->
      <section class="content">
        <h1>
          <span>Always</span>
          <span>Be Your</span>
          <span>Self</span>
        </h1>
        <div class="subtitle">Energy <span>Drink</span></div>
        <div class="price">Total order: <span style="color: var(--primary)">$12.00</span></div>

        <div class="quantity-select">
          <label>Choose Your</label>
          <div class="stepper">
            <button id="minus">&#x25B2;</button>
            <span id="qty">2</span>
            <button id="plus">&#x25BC;</button>
          </div>
        </div>

        <button class="btn-primary">
          <i class="fas fa-bag-shopping"></i> Buy Now
        </button>
      </section>

      <!-- Right visual column -->
      <section class="visual">
        <div class="circle-bg"></div>
        <!-- Soda can images (using placeholder images) -->
        <img
          src="https://images.unsplash.com/photo-1593655870521-aed27ff1a17d?auto=format&fit=crop&w=400&q=80"
          alt="Soda Can 1"
          class="can left"
          style="--rot:-20; --shift:-50px;"
        />
        <img
          src="https://images.unsplash.com/photo-1598133894008-85e77e02dc98?auto=format&fit=crop&w=400&q=80"
          alt="Soda Can 2"
          class="can right"
          style="--rot:10; --shift:50px;"
        />

        <!-- Badges -->
        <div class="badge best">
          <img
            src="https://img.icons8.com/fluency/48/approval.png"
            alt="Best"
          />
          <div>
            <strong>Best Drinks</strong><br />The things you can order
          </div>
        </div>

        <div class="badge classic">
          <img
            src="https://img.icons8.com/fluency/48/wine-glass.png"
            alt="Classic"
          />
          <div>
            <strong>Classic Drinks</strong><br />For traditionalists who like
          </div>
        </div>

        <div class="badge original">100%<br />Original<br />Product</div>

        <!-- Thumbnail list -->
        <div class="thumb-list">
          <div class="thumb">
            <img
              src="https://img.icons8.com/fluency/96/bottle-of-water.png"
              alt="thumb1"
            />
          </div>
          <div class="thumb">
            <img
              src="https://img.icons8.com/emoji/96/beer-mug.png"
              alt="thumb2"
            />
          </div>
          <div class="thumb">
            <img
              src="https://img.icons8.com/fluency/96/juice.png"
              alt="thumb3"
            />
          </div>
        </div>

        <!-- Giveaway link -->
        <div class="giveaway">
          Giveaway Free Sample <i class="fas fa-arrow-right"></i>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Simple stepper logic
    const qtyEl = document.getElementById("qty");
    document.getElementById("plus").addEventListener("click", () => {
      qtyEl.textContent = parseInt(qtyEl.textContent) + 1;
    });
    document.getElementById("minus").addEventListener("click", () => {
      const current = parseInt(qtyEl.textContent);
      if (current > 1) qtyEl.textContent = current - 1;
    });
  </script>
</body>
</html>
