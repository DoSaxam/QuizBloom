<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeonQuest Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* =====================
       THEME TOKENS
    ===================== */
    :root {
      /* Colors */
      --bg-base: #0A0E1A;
      --bg-surface: rgba(255, 255, 255, 0.06);
      --text-primary: #E6F1FF;
      --text-secondary: #9BB0C8;
      --accent-primary: #00FFCC;
      --accent-secondary: #1E90FF;
      --accent-magenta: #FF007F;
      --success: #22E39E;
      --warning: #FFCC00;
      --error: #FF4D6D;
      --chrome: #C0C0C0;
      --progress-gradient: linear-gradient(90deg, #FF007F, #00FFCC 50%, #1E90FF);

      /* Typography */
      --font-primary: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      --font-display: "Orbitron", "Press Start 2P", monospace;
      --fs-display: clamp(2rem, 5vw, 3rem);
      --fs-h1: clamp(1.75rem, 4vw, 2.4rem);
      --fs-h2: clamp(1.5rem, 3vw, 2rem);
      --fs-body: clamp(1rem, 2.2vw, 1.125rem);

      /* Others */
      --elevation: 0 12px 40px rgba(0, 255, 204, 0.15);
      --focus-ring: 0 0 0 3px rgba(0, 255, 204, 0.35);
      --glass-border: 1px solid rgba(255, 255, 255, 0.18);
      --grain-opacity: 0.06;
      --transition-fast: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* =====================
       GLOBAL RESET + UTILS
    ===================== */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-primary);
      font-size: var(--fs-body);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { font-family: var(--font-display); margin: 0; }
    h1 { font-size: var(--fs-h1); }
    h2 { font-size: var(--fs-h2); }
    button, select {
      font-family: inherit;
      font-size: 1em;
    }
    img { max-width: 100%; display: block; }
    [hidden] { display: none !important; }

    /* =====================
       GRAIN & SCANLINES
    ===================== */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR4nGMAAQAABQABDQottAAAAABJRU5ErkJggg=='); /* 1x1 px transparent placeholder */
      opacity: var(--grain-opacity);
      pointer-events: none;
      z-index: 1000;
    }

    /* =====================
       GLASS SURFACE
    ===================== */
    .glass {
      background: var(--bg-surface);
      backdrop-filter: blur(12px) saturate(160%);
      border: var(--glass-border);
      border-radius: 16px;
      box-shadow: var(--elevation);
    }

    /* =====================
       BUTTONS
    ===================== */
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4em;
      padding: 0.8em 1.6em;
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-weight: 600;
      color: var(--text-primary);
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      background: var(--bg-surface);
    }
    .btn-primary {
      background: var(--progress-gradient);
      color: #000;
    }
    .btn:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 12px var(--accent-primary);
    }
    .btn:active { transform: scale(0.98); }
    .btn[disabled] { opacity: 0.4; pointer-events: none; }

    /* =====================
       LAYOUT
    ===================== */
    .wrapper {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem;
    }
    .center-vh {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* =====================
       SPLASH
    ===================== */
    #splash {
      text-align: center;
      background: var(--grad-hero, radial-gradient(800px 400px at 12% 0%, rgba(0,255,204,0.22) 0%, rgba(0,0,0,0) 60%), radial-gradient(800px 400px at 88% 0%, rgba(255,0,127,0.18) 0%, rgba(0,0,0,0) 60%));
    }
    #logo {
      font-family: var(--font-display);
      font-size: var(--fs-display);
      color: var(--accent-primary);
      margin-bottom: 0.5em;
    }

    /* =====================
       SETUP FORM
    ===================== */
    #setup form {
      display: grid;
      gap: 1rem;
    }
    select, option {
      background: var(--bg-surface);
      border: var(--glass-border);
      border-radius: 12px;
      color: var(--text-primary);
      padding: 0.6em;
    }

    /* =====================
       QUIZ / QUESTION CARD
    ===================== */
    #question-card {
      padding: 1.2rem 1.6rem;
      display: grid;
      gap: 1rem;
    }
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.8rem;
    }
    .option-btn {
      background: var(--bg-surface);
      border: var(--glass-border);
      color: var(--text-primary);
      padding: 0.8em 1em;
      border-radius: 12px;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }
    .option-btn:hover { background: rgba(255,255,255,0.1); }
    .option-btn.selected { background: var(--accent-secondary); color: #000; }
    .option-btn.correct { background: var(--success); color: #000; }
    .option-btn.incorrect { background: var(--error); }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      height: 8px;
      background: var(--bg-surface);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      background: var(--progress-gradient);
      transition: width var(--transition-slow) linear;
    }

    /* Timer */
    #timer {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--accent-magenta);
      text-align: right;
    }

    /* =====================
       RESULTS
    ===================== */
    #results h2 { margin-bottom: 1rem; }

    /* =====================
       TOAST
    ===================== */
    #toast {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background: var(--bg-surface);
      border: var(--glass-border);
      padding: 0.8em 1.2em;
      border-radius: 12px;
      backdrop-filter: blur(12px) saturate(160%);
      box-shadow: var(--elevation);
      display: none;
      pointer-events: none;
    }

    /* Media Queries */
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation-duration: 0.001ms !important; }
    }
  </style>
</head>
<body>
  <main id="app">
    <!-- Splash Screen -->
    <section id="splash" class="center-vh wrapper">
      <div id="logo">NeonQuest</div>
      <h1>चलो भविष्य के ट्रिविया में!</h1>
      <p style="color:var(--text-secondary); margin-bottom:1.5rem;">Playful • Fast • Futuristic</p>
      <button id="btn-start" class="btn btn-primary">क्विज़ शुरू करें</button>
    </section>

    <!-- Setup Screen -->
    <section id="setup" class="center-vh wrapper" hidden>
      <h2>क्विज़ सेटअप</h2>
      <form id="setup-form" class="glass" style="padding:1.5rem;">
        <label>
          श्रेणी
          <select id="category-select" required></select>
        </label>
        <label>
          कठिनाई
          <select id="difficulty-select">
            <option value="">ऑटो</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <label>
          प्रश्नों की संख्या
          <select id="amount-select">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </label>
        <button type="submit" class="btn btn-primary">क्विज़ शुरू करें</button>
      </form>
    </section>

    <!-- Quiz Screen -->
    <section id="quiz" class="wrapper" hidden>
      <div id="timer">00:20</div>
      <div id="question-card" class="glass"></div>
      <div class="progress-container" aria-label="Quiz progress">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </section>

    <!-- Results Screen -->
    <section id="results" class="center-vh wrapper" hidden>
      <h2>आपका स्कोर</h2>
      <h1 id="final-score" style="font-size:3rem; color:var(--accent-primary);">0/0</h1>
      <button id="btn-replay" class="btn btn-primary">फिर से खेलें</button>
    </section>
  </main>

  <!-- Toast -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script>
    // =====================
    // Utility Functions
    // =====================
    const $ = sel => document.querySelector(sel);
    const show = (id) => { document.querySelectorAll('main > section').forEach(s=>s.hidden=true); $(id).hidden=false; }
    const shuffle = (arr) => arr.sort(() => Math.random() - 0.5);
    const decodeHTML = (html) => {
      const txt = document.createElement('textarea');
      txt.innerHTML = html;
      return txt.value;
    };
    const toast = (msg, ms=3000) => {
      const t = $('#toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(()=> t.style.display='none', ms);
    };

    // =====================
    // State
    // =====================
    let questions = [];
    let currentIdx = 0;
    let score = 0;
    let timerInterval = null;
    const TIMER_DURATION = 20; // seconds per question

    // =====================
    // DOM Elements
    // =====================
    const btnStart = $('#btn-start');
    const btnReplay = $('#btn-replay');
    const setupForm = $('#setup-form');
    const categorySelect = $('#category-select');
    const difficultySelect = $('#difficulty-select');
    const amountSelect = $('#amount-select');
    const questionCard = $('#question-card');
    const progressBar = $('#progress-bar');
    const timerEl = $('#timer');
    const finalScoreEl = $('#final-score');

    // =====================
    // Fetch Categories
    // =====================
    async function fetchCategories() {
      try {
        const res = await fetch('https://opentdb.com/api_category.php');
        const data = await res.json();
        data.trivia_categories.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = decodeHTML(c.name);
          categorySelect.appendChild(opt);
        });
      } catch (err) {
        console.error(err);
        toast('Categories failed to load');
      }
    }

    // =====================
    // Fetch Questions
    // =====================
    async function fetchQuestions(amount, category, difficulty) {
      let url = `https://opentdb.com/api.php?amount=${amount}&type=multiple`;
      if (category) url += `&category=${category}`;
      if (difficulty) url += `&difficulty=${difficulty}`;
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.response_code!==0) throw new Error('No questions');
        return data.results;
      } catch (err) {
        console.error(err);
        toast('Questions failed to load, using sample');
        // fallback sample
        return [
          {question:'Sample Q: 2+2 ?',correct_answer:'4',incorrect_answers:['1','2','3']}
        ];
      }
    }

    // =====================
    // Quiz Flow
    // =====================
    function startTimer() {
      let remaining = TIMER_DURATION;
      timerEl.textContent = `00:${String(remaining).padStart(2,'0')}`;
      timerInterval = setInterval(()=>{
        remaining--;
        timerEl.textContent = `00:${String(remaining).padStart(2,'0')}`;
        if (remaining<=0) {
          clearInterval(timerInterval);
          lockQuestion();
        }
      },1000);
    }

    function renderQuestion() {
      const q = questions[currentIdx];
      const answers = shuffle([q.correct_answer, ...q.incorrect_answers]);
      questionCard.innerHTML = `
        <div class="chip category">${decodeHTML(q.category||'General')}</div>
        <h2>${decodeHTML(q.question)}</h2>
        <div class="options-grid">
          ${answers.map(a=>`<button class="option-btn" data-answer="${encodeURIComponent(a)}">${decodeHTML(a)}</button>`).join('')}
        </div>
      `;
      // option listeners
      questionCard.querySelectorAll('.option-btn').forEach(btn=>btn.addEventListener('click', selectOption));
      // progress
      progressBar.style.width = `${(currentIdx/questions.length)*100}%`;
      // timer
      clearInterval(timerInterval);
      startTimer();
    }

    function selectOption(e) {
      const chosen = decodeURIComponent(e.currentTarget.dataset.answer);
      const q = questions[currentIdx];
      lockQuestion(chosen);
    }

    function lockQuestion(chosen=null) {
      clearInterval(timerInterval);
      const q = questions[currentIdx];
      const buttons = questionCard.querySelectorAll('.option-btn');
      buttons.forEach(btn=>{
        const val = decodeURIComponent(btn.dataset.answer);
        if (val === q.correct_answer) btn.classList.add('correct');
        else if (val === chosen) btn.classList.add('incorrect');
        btn.disabled = true;
      });
      if (chosen === q.correct_answer) {
        score++;
        toast('सही!',1500);
      }
      setTimeout(()=>{
        currentIdx++;
        if (currentIdx < questions.length) renderQuestion();
        else endQuiz();
      }, 1000);
    }

    function endQuiz() {
      progressBar.style.width = '100%';
      finalScoreEl.textContent = `${score}/${questions.length}`;
      show('#results');
    }

    // =====================
    // EVENT LISTENERS
    // =====================
    btnStart.addEventListener('click', () => { show('#setup'); });
    btnReplay.addEventListener('click', () => { show('#splash'); });

    setupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      btnStart.disabled = btnReplay.disabled = true;
      const amount = amountSelect.value;
      const category = categorySelect.value;
      const difficulty = difficultySelect.value;
      questions = await fetchQuestions(amount, category, difficulty);
      currentIdx = 0; score = 0;
      show('#quiz');
      renderQuestion();
      btnStart.disabled = btnReplay.disabled = false;
    });

    // =====================
    // INIT
    // =====================
    fetchCategories();
  </script>
</body>
</html>
